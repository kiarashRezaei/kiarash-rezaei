          - text: ","
          - strong [ref=e22]: Explainable Machine Learning
          - text: ", and"
          - strong [ref=e23]: Communication Systems
          - text: . My research focuses on developing robust, interpretable models for intelligent network management, with an emphasis on
          - strong [ref=e24]: real‑world reliability
          - text: and
          - strong [ref=e25]: generalization
          - text: .
        - paragraph [ref=e26]:
          - emphasis [ref=e27]: Current focus.
          - text: My current research examines
          - strong [ref=e28]: uncertainty quantification
          - text: as a core pillar of
          - strong [ref=e29]: trustworthy autonomous networks
          - text: ", focusing on how systems recognise and manage uncertainty under distribution shift and how these estimates support interpretable and auditable decision processes in operational 5G/6G environments."
